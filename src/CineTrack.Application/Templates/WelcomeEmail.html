<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #eee; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; padding-bottom: 30px; border-bottom: 2px solid #e94560; }
        .header h1 { color: #e94560; font-size: 28px; margin: 0; }
        .content { padding: 30px 0; line-height: 1.8; }
        .highlight { color: #e94560; font-weight: bold; }
        .footer { text-align: center; padding-top: 20px; border-top: 1px solid #333; color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CineTrack</h1>
        </div>
        <div class="content">
            <p>Hey <span class="highlight">{{Username}}</span>,</p>
            <p>Welcome to CineTrack! Your account has been created successfully.</p>
            <p>Start tracking your favorite movies and actors now. Add films to your favorites, follow actors, and never miss a trending title.</p>
            <p>Enjoy the show!</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 CineTrack. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
